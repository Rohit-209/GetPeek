<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>GetPeek</title>
    <link rel="stylesheet" href="sidepanel.css" />
  </head>
  <body>
    <header class="sp-header">
      <div class="sp-brand">
        <span class="sp-logo">👁</span>
        <span class="sp-title">GetPeek</span>
      </div>
      <button id="clearBtn" class="sp-clear" title="Clear history">Clear</button>
    </header>

    <main id="list" class="sp-list">
      <div id="empty" class="sp-empty">
        <p>No briefs yet.</p>
        <p class="sp-empty-hint">Hover any YouTube thumbnail to generate one.</p>
      </div>
    </main>

    <script src="sidepanel.js"></script>
  </body>
</html>
