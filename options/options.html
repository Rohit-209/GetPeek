<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>GetPeek Settings</title>
  <link rel="stylesheet" href="options.css">
</head>
<body>
  <div class="container">
    <header>
      <h1>👁 GetPeek</h1>
      <p class="subtitle">YouTube Video Summarizer</p>
    </header>

    <section class="card">
      <h2>API Configuration</h2>
      <div class="field">
        <label for="apiKey">Gemini API Key</label>
        <div class="input-group">
          <input type="password" id="apiKey" placeholder="Enter your Gemini API key" autocomplete="off">
          <button id="toggleKey" class="btn-icon" title="Show/hide key">👁</button>
        </div>
        <p class="hint">Get a free key at <a href="https://aistudio.google.com/apikey" target="_blank">aistudio.google.com/apikey</a></p>
      </div>

      <div class="field">
        <label for="model">Model</label>
        <select id="model">
          <option value="gemini-2.5-flash">Gemini 2.5 Flash (Recommended)</option>
          <option value="gemini-2.0-flash">Gemini 2.0 Flash</option>
          <option value="gemini-1.5-flash">Gemini 1.5 Flash</option>
        </select>
      </div>

      <button id="saveBtn" class="btn-primary">Save Settings</button>
      <span id="saveStatus" class="status"></span>
    </section>

    <section class="card">
      <h2>Usage Today</h2>
      <div class="stats">
        <div class="stat">
          <span class="stat-value" id="requestCount">0</span>
          <span class="stat-label">Requests</span>
        </div>
        <div class="stat">
          <span class="stat-value" id="cacheCount">—</span>
          <span class="stat-label">Cached Videos</span>
        </div>
      </div>
      <div class="progress-bar">
        <div class="progress-fill" id="quotaBar"></div>
      </div>
      <p class="hint" id="quotaText">0 / 1,500 daily requests used</p>
    </section>

    <section class="card">
      <h2>Cache</h2>
      <p class="hint">Cached summaries are stored locally and expire after 7 days.</p>
      <button id="clearCacheBtn" class="btn-secondary">Clear Cache</button>
      <span id="cacheStatus" class="status"></span>
    </section>
  </div>

  <script src="options.js"></script>
</body>
</html>
